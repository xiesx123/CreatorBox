<!DOCTYPE html>
<html lang="{{request.state.lang}}">

<head>
  <meta charset="utf-8" />
  <title>{{ data.app.title }} - Dubbing</title>
  <meta name="renderer" content="webkit" />
  <meta name="viewport" content="width=device-width, initial-scale=0.7" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <!-- jquery -->
  <script src="static/js/jquery/jquery.min.js"></script>
  <script src="static/js/thirdparty/sortable.min.js"></script>
  <!-- aplayer -->
  <link href="static/js/thirdparty/aplayer/aplayer.min.css" rel="stylesheet">
  <script src="static/js/thirdparty/aplayer/aplayer.min.js"></script>
  <!-- nprogress -->
  <link href="static/js/thirdparty/nprogress/nprogress.min.css" rel="stylesheet">
  <script src="static/js/thirdparty/nprogress/nprogress.min.js"></script>
  <!-- socket -->
  <script src="static/js/thirdparty/socket.io.min.js"></script>
  <!-- layui -->
  <link href="static/js/layui/css/layui.css" rel="stylesheet">
  <link href="static/js/layui/css/layui-nav.css" rel="stylesheet">
  <link href="static/js/layui/css/layui-dark.css" rel="stylesheet">
  <script src="static/js/layui/layui.js"></script>
  <!-- app -->
  <link href="static/js/app/app.css" rel="stylesheet">
  <script src="static/js/app/app.js"></script>
</head>

<body class="collapse" layadmin-themealias="default">

  <div class="layui-layout layui-layout-admin">

    <!-- 顶部区域 -->
    <div class="layui-header">

      <!-- 头部区域（可配合layui 已有的水平导航） -->
      <ul class="layui-nav layui-layout-left" lay-filter="nav-top">
        <li class="layui-nav-item" lay-header-event="menuLeft">
          <i class="layui-icon layui-icon-spread-left" style="font-size: 18px"></i>
        </li>
        <li class="layui-nav-item" lay-header-event="menuLeft">
          <span style="padding: 15px; font-size: 16px; background-color: unset">{{ data.app.version }} </span>
        </li>
        <li class="layui-nav-item">
          <a id="example-selector" href="javascript:;" style="padding-left: 8px;padding-right: 8px;" lay-tips="{content: '{{_('示例')}}', margin: '0 0 0 -10px' }">
            <i class="layui-icon layui-icon-template-1" style="font-size: 18px"></i>
          </a>
        </li>
      </ul>
      <ul class="layui-nav layui-layout-right" lay-filter="nav-top">
        <li class="layui-nav-item">
          <a data-path="/speaker?lang={{request.state.lang}}" href="javascript:;" style="padding-left: 8px;padding-right: 8px;" lay-tips="{content: '{{_('说话人')}}', margin: '0 0 0 -10px' }">
            <i class="layui-icon layui-icon-headset" style="font-size: 18px"></i>
          </a>
        </li>
        <li class="layui-nav-item">
          <a data-path="/plugins?lang={{request.state.lang}}" href="javascript:;" style="padding-left: 8px;padding-right: 8px;" lay-tips="{content: '{{_('组件')}}', margin: '0 0 0 -10px' }">
            <i class="layui-icon layui-icon-component" style="font-size: 18px"></i>
          </a>
        </li>
        <li class="layui-nav-item">
          <a id="change-theme" style="padding-left: 8px;padding-right: 8px;" lay-tips="{content: '{{_('主题')}}', margin: '0 0 0 -10px' }">
            <i class="layui-icon layui-icon-moon" style="font-size: 18px"></i>
          </a>
        </li>
      </ul>
    </div>

    <!-- 主体区域 -->
    <div id="layui-body" class="layui-body" style="padding: 10px">
      <form class="layui-form layui-form-pane" lay-filter="form_filter">

        <div class="layui-row layui-col-space15">

          <!-- 基础 -->
          <div class="layui-col-md12">
            <div class="layui-collapse" lay-filter="collapse_filter_base">
              <div class="layui-colla-item">

                <div class="layui-card layui-panel">
                  <div class="layui-colla-title">{{_("基础")}}</div>
                  <div class="layui-colla-content layui-show">

                    <div class="layui-form-item" pane>
                      <label class="layui-form-label">{{_("模式")}}</label>
                      <div class="layui-input-block">
                        {% for item in data.base.mode_types %}
                        <input type="radio" name="mode_type" value="{{ item.val }}" lay-filter="mode_type_filter" title="{{ item.desc_zh if request.state.lang == 'zh' else item.desc_en }}" {% if not item.enable %}disabled{% endif %}>
                        {% endfor %}
                      </div>
                    </div>

                    <div class="layui-form-item" pane id="align_type_div">
                      <label class="layui-form-label">{{_("对齐")}}</label>
                      <div class="layui-input-block">
                        {% for item in data.base.align_types %}
                        <input type="radio" name="align_type" value="{{ item.val }}" title="{{ item.desc_zh if request.state.lang == 'zh' else item.desc_en }}">
                        {% endfor %}
                      </div>
                    </div>

                    <div class="layui-form-item" id="video_url_div">
                      <label class="layui-form-label" id="video_upload" lay-tips="{content: '{{_('上传')}}', margin: '0 0 0 -10px' }">{{_("文件")}}
                        <span class="layui-badge-dot layui-bg-green"></span></label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-video"></i> </div>
                          <input id="video_url" type="text" name="video_url" lay-verify="video_path" placeholder='{{_("请输入音视频路径或链接")}}' autocomplete="off" class="layui-input" lay-filter="play" lay-affix="play">
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label" id="json_upload" lay-tips="{content: '{{_('上传')}}', margin: '0 0 0 -10px' }">{{_("数据")}}
                        <span class="layui-badge-dot layui-bg-green"></span></label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-file"></i> </div>
                          <input id="json_file" type="text" name="json_file" lay-verify="json_path" placeholder='{{_("请输入JSON数据文件路径")}}' autocomplete="off" class="layui-input" lay-filter="editer" lay-affix="form">
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">{{_("地区")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-location"></i> </div>
                          <select id="locale" name="locale" lay-verify="required" lay-filter="locale_filter">
                            <option value="">{{_("选择或搜索")}}</option>
                            {% for item in data.base.locales %}
                            <option value="{{ item.locale }}">{{ item.locale }} - {{ item.name if request.state.lang == 'zh' else item.country }}</option>
                            {% endfor %}
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">{{_("后缀")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-note"></i> </div>
                          <input id="suffix" type="text" name="suffix" lay-verify="required" placeholder='{{_("请输入后缀")}}' autocomplete="off" class="layui-input" lay-affix="clear">
                        </div>
                      </div>
                    </div>

                  </div>
                </div>

              </div>
            </div>
          </div>

          <!-- 配音 -->
          <div class="layui-col-md12">
            <div class="layui-collapse" lay-filter="collapse_filter_tts">
              <div class="layui-colla-item">

                <div class="layui-card layui-panel">
                  <div class="layui-colla-title">{{_("配音")}}</div>
                  <div class="layui-colla-content layui-show">

                    <div class="layui-form-item">
                      <label class="layui-form-label"> {{_("提供商")}} </label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-component"></i> </div>
                          <select id="tts_provider" name="tts_provider" lay-verify="required|tts_provider" lay-filter="tts_provider_filter">
                            <option value="">{{_("选择或搜索")}}</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item layui-hide" pane id="opt_server">
                      <label class="layui-form-label">{{_("服务地址")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-website"></i> </div>
                          <input type="text" name="tts_server" placeholder="{{ _('请输入服务地址')}}" autocomplete="off" class="layui-input" lay-affix="clear" disabled>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">{{_("模型")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-template-1"></i> </div>
                          <input type="text" name="tts_model" placeholder="{{ _('请输入模型名称')}}" autocomplete="off" class="layui-input" lay-affix="clear" disabled>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item" pane>
                      <label class="layui-form-label">{{_("性别")}}</label>
                      <div class="layui-input-block">
                        <input type="radio" name="tts_gender" value="1" lay-filter="tts_gender_filter" title='{{_("男")}}'>
                        <div lay-radio>
                          <span>{{_("男")}} <i class="layui-icon layui-icon-male"></i></span>
                        </div>
                        <input type="radio" name="tts_gender" value="2" lay-filter="tts_gender_filter" title='{{_("女")}}'>
                        <div lay-radio>
                          <span>{{_("女")}} <i class="layui-icon layui-icon-female"></i></span>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">{{_("音色")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i id="tts_voice_icon" class="layui-icon layui-icon-username"></i> </div>
                          <select id="tts_voice" name="tts_voice" lay-verify="required" lay-filter="tts_voice_filter" lay-search="{caseSensitive:false, fuzzy: true}">
                            <option value="">{{_("选择或搜索")}}</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">{{_("音量")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-slider"></i> </div>
                          <input type="number" lay-verify="required" name="tts_volume" placeholder="[0,1]" autocomplete="off" class="layui-input" min="0" max="2" step="0.01" lay-affix="number">
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item layui-hide" pane id="opt_rate">
                      <label class="layui-form-label">{{_("语速")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-slider"></i> </div>
                          <input type="number" lay-verify="required" name="tts_rate" placeholder="[0,2]" autocomplete="off" class="layui-input" min="0" max="2" step="0.01" lay-affix="number">
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item layui-hide" pane id="opt_pitch">
                      <label class="layui-form-label">{{_("语调")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-slider"></i> </div>
                          <input type="number" lay-verify="required" name="tts_pitch" placeholder="[0,2]" autocomplete="off" class="layui-input" min="0" max="2" step="0.01" lay-affix="number">
                        </div>
                      </div>
                    </div>

                    <!-- azure -->
                    <div class="layui-col-md12 layui-hide" id="azure_div"></div>
                    <!-- edge -->
                    <div class="layui-col-md12 layui-hide" id="edge_div"></div>
                    <!-- elab -->
                    <div class="layui-col-md12 layui-hide" id="elab_div"></div>
                    <!-- cosy -->
                    <div class="layui-col-md12 layui-hide" id="cosy_div"></div>
                    <!-- itts -->
                    <div class="layui-col-md12 layui-hide" id="itts_div"></div>
                    <!-- sovits -->
                    <div class="layui-col-md12 layui-hide" id="gtts_div"></div>
                    <!-- voxm -->
                    <div class="layui-col-md12 layui-hide" id="voxm_div"></div>

                    <!-- opt -->
                    <div class="layui-form-item layui-hide" pane id="opt_role" lay-tips="{content: '{{_('选择试听')}}', margin: '0 0 0 -10px' }">
                      <label class="layui-form-label">{{_("角色扮演")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-headset"></i> </div>
                          <select id="tts_role" name="tts_role" lay-filter="tts_role_filter" lay-search="{caseSensitive:false, fuzzy: true}">
                            <option value="">{{_("选择或搜索")}}</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item layui-hide" pane id="opt_style" lay-tips="{content: '{{_('选择试听')}}', margin: '0 0 0 -10px' }">
                      <label class="layui-form-label">{{_("说话风格")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-headset"></i> </div>
                          <select id="tts_style" name="tts_style" lay-filter="tts_style_filter" lay-search="{caseSensitive:false, fuzzy: true}">
                            <option value="">{{_("选择或搜索")}}</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item layui-hide" pane id="opt_styledegree" lay-tips="{content: '{{_('选择试听')}}', margin: '0 0 0 -10px' }">
                      <label class="layui-form-label">{{_("风格强度")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-search"></i> </div>
                          <select id="tts_styledegree" name="tts_styledegree" lay-filter="tts_styledegree_filter" lay-search>
                            {% for item in data.tts.styledegrees %}
                            <option value="{{ item.val }}">{{ loop.index }}.{{ item.desc_zh if request.state.lang == 'zh' else item.desc_en }}</option>
                            </option>
                            {% endfor %}
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item layui-hide" pane id="opt_seed" lay-tips="{content: '{{_('控制结果可复现')}}', margin: '0 0 0 -10px' }">
                      <label class="layui-form-label">{{_("种子")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-note"></i> </div>
                          <input type="number" name="tts_seed" lay-verify="required|number" placeholder='{{_("请输入随机种子")}}' autocomplete="off" class="layui-input" lay-filter="seed" lay-affix="release" onkeyup="value=value.slice(0,8)"></input>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">{{_("备注")}}</label>
                      <div class="layui-input-block">
                        <div class="layui-input-wrap">
                          <div class="layui-input-prefix"> <i class="layui-icon layui-icon-note"></i> </div>
                          <input name="tts_remarks" placeholder='{{_("随便写点什么")}}' lay-affix="clear" class="layui-input"></input>
                        </div>
                      </div>
                    </div>

                    <div class="layui-form-item layui-form-text">
                      <label class="layui-form-label" id="tts_preview" lay-tips="{content: '{{_('点击试听')}}', margin: '0 0 0 -10px' }">{{
                        _("试听") }} <i class="layui-icon layui-icon-headset"></i></label>
                      <div class="layui-input-block">
                        <textarea id="tts_text" name="tts_text" placeholder='{{_("请输入试听文本")}}' lay-verify="tts_text" lay-reqtext='{{_("请输入试听文本")}}' lay-affix="clear" class="layui-textarea tts_text" maxlength="1000"></textarea>
                      </div>
                    </div>

                    <table id="tts_voices_table" class="layui-table"></table>
                  </div>
                </div>

              </div>
            </div>
          </div>

          <!-- 提交 -->
          <div class="layui-col-md12">
            <div class="layui-form-item layui-col-space15">
              <div id="floating-div" class="layui-col-md12">
                <button type="submit" class="layui-btn layui-btn-fluid" lay-submit lay-filter="form_submit">{{
                  _("执行") }}</button>
              </div>
              <!-- <div class="layui-col-md12">
                <div class="layui-col-md2">
                  <button type="reset" class="layui-btn layui-btn-primary layui-border layui-btn-fluid">重置</button>
                </div>
              </div> -->
            </div>
          </div>

      </form>
    </div>

    <div>
      <input type="hidden" id="import" />
    </div>

    <!-- APlayer 播放器容器 -->
    <div id="aplayer"></div>

  </div>

  <script type="text/html" id="TPL_tts_voices_table_tools">
    <div class="layui-btn-container">
      <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="preview">{{_("试听")}}</a>
      <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="del">{{_("删除")}}</a>
    </div>
  </script>

  <script>

    layui.use(['form', 'layer', 'element', 'util', 'notice', 'tool', 'i18n', 'tts', 'example'], function () {

      var form = layui.form;
      var layer = layui.layer;
      var element = layui.element;
      var util = layui.util;
      var toast = layui.notice;
      var tool = layui.tool;
      var i18n = layui.i18n;
      var example = layui.example;
      var $ = layui.$;

      i18n.init('{{request.state.lang}}');

      var app = JSON.parse('{{ data.app | tojson }}')
      var os = '{{ os }}'
      console.log("%s %s.%s build on %s at %s %s", app.title, app.version, app.build.hash, app.build.branch, app.build.date, os);

      let CREATORBOX = "dubbing"
      let cache = layui.data(CREATORBOX)

      var form_data = JSON.parse('{{ data.form | tojson }}')              // 表单默认值
      var cache_form = cache.hasOwnProperty('form') ? cache.form : {}     // 表单缓存值
      var cache_table = cache.hasOwnProperty('table') ? cache.table : []  // 配音缓存值
      var form_json = Object.keys(cache_form).length === 0 ? Object.assign({}, form_data) : Object.assign({}, form_data, cache_form)
      
      // 配音扩展
      var tts = layui.tts;
      tts.setData(form_json, cache_table)

      // 示例扩展
      example.init('#example-selector');

      // 表单渲染
      form.val('form_filter', form_json);

      // 表单初始
      $('#align_type_div').toggleClass('layui-hide', form_json.mode_type != 3);
      $('#video_url_div').toggleClass('layui-hide', form_json.mode_type == 1);
      $("#tts_text").val() || $("#tts_text").val(i18n.trans("creatorbox"));

      // 表单验证 
      form.verify({
        video_path: function (value, elem) {
          var mode_type = $('input[name="mode_type"]:checked').val();
          if (mode_type != 1 && value.length == 0) {
            return '{{_("请输入音视频路径或链接")}}';
          }
        },
        json_path: function (value, elem) {
          if (value.length == 0) {
            return '{{_("请输入数据文件路径")}}';
          }
        },
        tts_provider: function (value, elem) {
          var tableData = layui.table.cache['tts_voices_table'];
          if (tableData.length == 0 && $('select[name="tts_provider"]').val() != 'itts') {
            return '{{_("请至少添加一个配音角色")}}';
          }
        },
        tts_text: function (value, elem) {
          tts_text = $("#tts_text").val()
          if (tts_text.length == 0) {
            return '{{_("请输入试听文本")}}';
          }
        },
      });

      // =======================================

      // 视频上传
      tool.upload("#video_upload", "file/upload", 'file', 'mp4|mkv|avi|mp3|wav|m4a|flac', function (response) {
        $('[name="video_url"]').val(response.data.location)
      })

      // 数据上传
      tool.upload("#json_upload", "file/upload", 'file', 'json', function (response) {
        $('[name="json_file"]').val(response.data.location)
      })

      // 视频播放
      form.on('input-affix(play)', function (data) {
        var elem = data.elem;
        var video_url = elem.value;
        if (!video_url) {
          layer.msg('{{_("请输入音视频路径或链接")}}', { icon: 0 });
          return elem.focus()
        };
        tool.open(`player?url=${video_url}&autoplay=true`);
      });

      // 数据编辑
      form.on('input-affix(editer)', function (data) {
        var elem = data.elem;
        var data_url = elem.value;
        if (!data_url) {
          layer.msg('{{_("请输入数据文件路径")}}', { icon: 0 });
          return elem.focus()
        };
        tool.open(`editor?upload=file/upload&remote=file/download?path=${data_url}&mode=table`);
      });

      // 随机种子
      form.on('input-affix(seed)', function (data) {
        $('input[name="tts_seed"]').val(tool.random());
      });

      // 地区选择
      form.on('select(locale_filter)', function (data) {
        if (data.elem.value != "") {
          form_json.locale = data.elem.value;
          form_json.tts_gender = 1;
          // 恢复默认选择
          $('input[name="tts_gender"][value="1"]').prop('checked', true);
          form.render('radio');
          // 刷新提供商
          tts.getProvidersByLocale(form_json.locale, function (providers) {
            console.debug("Providers refreshed for locale: " + form_json.locale);
          });
        }
      });

      // 处理模式
      form.on('radio(mode_type_filter)', function (data) {
        var mode_type = data.elem.value;
        // 对齐选项仅在配音模式（mode_type = 1）显示
        $('#align_type_div').toggleClass('layui-hide', mode_type != 3);
        // 视频文件输入在合成模式（mode_type = 3）隐藏
        $('#video_url_div').toggleClass('layui-hide', mode_type == 1);
      });

      // 提交执行
      form.on('submit(form_submit)', function (data) {
        var field = data.field;
        var elem = data.elem;
        // 本地存储
        layui.data(CREATORBOX, { key: 'form', value: field });
        // 配音
        field.tts_dubbing = cache_table;
        // 请求数据
        data = JSON.stringify(field, null, 2);
        console.debug(field)
        // 确认执行
        layer.confirm(i18n.trans("确定提交？"), {
          icon: 3,
          title: i18n.trans('提示'),
          btn: [i18n.trans('确定'), i18n.trans('取消')]
        }, function (index) {
          layer.close(index);
          // 请求调用
          tool.post("dubb/pipeline", data, function (response) {
            var taskId = response.data.task_id
            toast.info(taskId, i18n.trans("任务提交成功"));
            // 任务存储
            localStorage.setItem('task', taskId)
          })
        });
        return false;
      });

      // 回调通知
      tool.connect(function (data) {
        if (data.type == "video") {
          toast.success(localStorage.getItem('task'), i18n.trans("任务处理成功"));
        }
        else if (data.type == "error") {
          toast.error(data.message, i18n.trans("任务处理异常"));
        }
      })

      // 固定条
      var bars = [
        { type: i18n.trans("数据"), icon: 'layui-icon-fonts-code' },
      ];
      util.fixbar({
        bars: bars,
        bar1: false,
        bar2: false,
        bgcolor: '#393D52',
        css: { bottom: 80 },
        on: {
          mouseenter: function (desc) {
            layer.tips(desc, this, {
              tips: 4,
              fixed: true
            });
          },
          mouseleave: function (type) {
            layer.closeAll('tips');
          }
        },
        click: function (type) {
          if (type == i18n.trans("数据")) {
            filename = $("#video_url").val().split(/[/\\]/).pop().split(".")[0];
            if (filename == "") {
              layer.msg('{{_("请输入音视频路径或链接")}}', { icon: 0 });
              setTimeout(function () {
                util.openWin({ url: `editor?mode=tree` });
              }, 1000);
              return
            }
            suf = $("#suffix").val();
            if (suf == "") {
              return layer.msg('{{_("请输入后缀")}}', { icon: 0 });
            }
            title = `{{ data.app.title }} - ${filename}_${suf}`;
            util.openWin({ url: `editor?upload=file/upload&remote=file/download?path=webapp/dubb/${filename}/${suf}/${filename}.json&mode=table` });
          }
        }
      });

      // =======================================

      element.on('nav(nav-top)', function (elem) {
        var path = elem.data('path');
        if (path) {
          tool.open(path);
        }
      });
    });

  </script>
  <script src="static/js/app/theme.js"></script>

</body>

</html>
