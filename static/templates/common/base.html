<!DOCTYPE html>
<html lang="{{request.state.lang}}">

<head>
  <meta charset="utf-8" />
  <title>{{ data.app.title }} - {{ data.subtitle }}</title>
  <meta name="renderer" content="webkit" />
  <meta name="viewport" content="width=device-width, initial-scale=0.8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

  <!-- jquery -->
  <script src="static/js/thirdparty/jquery.min.js"></script>
  <!-- nprogress -->
  <link href="static/js/thirdparty/nprogress/nprogress.min.css" rel="stylesheet">
  <script src="static/js/thirdparty/nprogress/nprogress.min.js"></script>
  <!-- socket -->
  <script src="static/js/thirdparty/socket.io.min.js"></script>
  <!-- layui -->
  <link href="static/js/thirdparty/layui/css/layui.css" rel="stylesheet">
  <link href="static/js/thirdparty/layui/css/layui-nav.css" rel="stylesheet">
  <link href="static/js/thirdparty/layui/css/layui-dark.css" rel="stylesheet">
  <script src="static/js/thirdparty/layui/layui.js"></script>

  <!-- header_extra -->
  {% block header_extra %}{% endblock %}

  <!-- app -->
  <link href="static/js/app/app.css" rel="stylesheet">
  <script src="static/js/app/app.js"></script>
</head>

<body class="collapse" layadmin-themealias="default">

  {% set header_content = self.header_content() %}
  <div class="layui-layout {% if header_content.strip() %}layui-layout-admin{% endif %}">

    <!-- header_content -->
    {% block header_content %}{% endblock %}

    <!-- body_content -->
    <div id="layui-body" class="layui-body" style="padding: 10px">
      {% block body_content %}{% endblock %}
    </div>

  </div>

  <script src="static/js/app/theme.js"></script>
  <!-- scripts_extra -->
  {% block scripts_extra %}{% endblock %}

</body>

</html>
