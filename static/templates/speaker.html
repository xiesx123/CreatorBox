<!DOCTYPE html>
<html lang="{{request.state.lang}}">

<head>
    <meta charset="utf-8" />
    <title>{{ data.app.title }} - Speaker</title>
    <meta name="renderer" content="webkit" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <!-- jquery -->
    <script src="static/js/thirdparty/jquery.min.js"></script>
    <!-- aplayer -->
    <link href="static/js/thirdparty/aplayer/aplayer.min.css" rel="stylesheet">
    <script src="static/js/thirdparty/aplayer/aplayer.min.js"></script>
    <!-- nprogress -->
    <link href="static/js/thirdparty/nprogress/nprogress.min.css" rel="stylesheet">
    <script src="static/js/thirdparty/nprogress/nprogress.min.js"></script>
    <!-- layui -->
    <link href="static/js/thirdparty/layui/css/layui.css" rel="stylesheet" />
    <link href="static/js/thirdparty/layui/css/layui-dark.css" rel="stylesheet" />
    <script src="static/js/thirdparty/layui/layui.js"></script>
    <!-- app -->
    <link href="static/js/app/app.css" rel="stylesheet">
    <script src="static/js/app/app.js"></script>
</head>

<body class="collapse" layadmin-themealias="default">
    <div class="layui-layout layui-layout-admin">

        <form class="layui-form layui-form-pane" lay-filter="form_filter">
            <!-- 说话人 -->
            <div class="layui-collapse" lay-filter="collapse_filter_speaker">
                <div class="layui-colla-item">
                    <div class="layui-card layui-panel">
                        <div class="layui-colla-title">
                            {{_("说话人")}}
                        </div>

                        <div class="layui-colla-content layui-show">
                            <input type="hidden" name="id" />

                            <div lay-filter="query_filter" class="layui-form-item layui-hide">
                                <label class="layui-form-label" id="audio_upload">{{_("音频")}} <span class="layui-badge-dot layui-bg-green"></span></label>
                                <div class="layui-input-block">
                                    <input type="text" name="path" lay-verify="path" placeholder='{{_("请输入音频路径、链接")}}' autocomplete="off" class="layui-input" lay-affix="clear">
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label">{{_("说话人")}}</label>
                                <div class="layui-input-block">
                                    <input id="suffix" type="text" name="speaker" placeholder=' {{_("请输入说话人名称")}}' lay-verify="required" autocomplete="off" class="layui-input" lay-affix="clear" />
                                </div>
                            </div>

                            <div class="layui-form-item" pane>
                                <label class="layui-form-label">{{_("性别")}}</label>
                                <div class="layui-input-block">
                                    <input type="radio" name="gender" value="1" lay-verify="required" lay-filter="gender_filter" title='{{_("男")}}' />
                                    <input type="radio" name="gender" value="2" lay-verify="required" lay-filter="gender_filter" title='{{_("女")}}' />
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label">{{_("地区")}}</label>
                                <div class="layui-input-block">
                                    <select id="locale" name="locale" lay-verify="required" lay-filter="locale_filter">
                                        <option value="">{{_("选择或搜索")}}</option>
                                        {% for item in data.locales %}
                                        <option value="{{ item.locale }}">
                                            {{ item.locale }} - {{ item.name if request.state.lang == 'zh' else item.country }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label">{{_("情感")}}</label>
                                <div class="layui-input-block">
                                    <select id="emotion" name="emotion" lay-verify="required" lay-filter="emotion_filter">
                                        <option value="">{{_("选择或搜索")}}</option>
                                        {% for item in data.emotions %}
                                        <option value="{{ item.value }}"> {{ item.value }} </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div lay-filter="query_filter" class="layui-form-item layui-hide">
                                <label class="layui-form-label">{{_("文本")}}</label>
                                <div class="layui-input-block">
                                    <input id="suffix" type="text" name="text" placeholder='{{_("请输入音频文本")}}' autocomplete="off" class="layui-input" lay-verify="required" lay-affix="clear" />
                                </div>
                            </div>

                            <div class="layui-form-item layui-col-space15" style="margin-bottom: 0px">
                                <div class="layui-col-md10">
                                    <button type="submit" class="layui-btn layui-btn-primary layui-btn-fluid" lay-submit lay-filter="form_submit">
                                        {{_("查询")}}
                                    </button>
                                </div>
                                <div class="layui-col-md2">
                                    <button type="reset" class="layui-btn layui-btn-primary layui-border layui-btn-fluid">
                                        {{_("重置")}}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>

        <div style="padding: 6px">
            <table id="table" class="layui-table" style="margin: 0px"></table>
        </div>
    </div>

    <!-- APlayer 播放器容器 -->
    <div id="aplayer"></div>

    <!-- 表格工具栏 -->
    <script type="text/html" id="TPL_table_toolbar">
      <div class="layui-inline" lay-event="query">
        <i class="layui-icon layui-icon-search"></i>
      </div>
      <div class="layui-inline" lay-event="add">
        <i class="layui-icon layui-icon-add-circle"></i>
      </div>
      <div class="layui-inline" lay-event="delete">
        <i class="layui-icon layui-icon-delete"></i>
      </div>
    </script>

    <!-- 表格行工具 -->
    <script type="text/html" id="TPL_table_tools">
      <div class="layui-btn-container">
        <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="preview">{{_("试听")}}</a>
        <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="download">{{_("下载")}}</a>
        <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="update">{{_("编辑")}}</a>
      </div>
    </script>

    <!-- 启用禁用 -->
    {% raw %}
    <script type="text/html" id="TPL_table_status">
      <input type="checkbox" name="status" value={{d.status}} lay-skin="primary" mid={{d.id}} lay-filter="table_status_filter" {{ d.status == '1' ? 'checked' : '' }}>
    </script>
    {% endraw %}

    <script>

        layui.use(['form', 'table', 'layer', 'element', 'upload', 'util', 'i18n_', `enums`, 'toastr', 'tools'], function () {

            var form = layui.form;
            var table = layui.table;
            var layer = layui.layer;
            var element = layui.element;
            var upload = layui.upload;
            var util = layui.util;
            var i18n = layui.i18n_;
            i18n.init('{{request.state.lang}}');

            var enums = layui.enums;
            var toast = layui.toastr;
            var tools = layui.tools;
            var $ = layui.$;

            let player;
            let action = "query";

            var curr = 1
            var form_json = {}

            // 表单验证
            form.verify({
                required: function (value, elem) {
                    if (value.length == 0 && action != "query") {
                        if (elem.nodeName == 'INPUT') {
                            return elem.placeholder;
                        } else if (elem.nodeName == 'SELECT') {
                            return elem.options[0].text
                        } else {
                            return i18n.trans("不能为空");
                        }
                    }
                },
                path: function (value, elem) {
                    if (value.length == 0 && !["query"].includes(action)) {
                        return i18n.trans("请输入本地路径");
                    }
                }
            });

            // 表单=============

            // 表单-音频上传
            tools.upload("#audio_upload", "spk/upload", 'audio', 'mp3|wav|m4a|flac', function (response) {
                layer.msg(i18n.trans("识别成功"), { icon: 1 });
                if (response.code == 0) {
                    data = response.data
                    form_json.id = $('input[name="id"]').val();
                    form_json.path = data.location
                    form_json.text = data.text
                    form_json.speaker = data.location.split(/[/\\]/).pop().split(".")[0]
                    form_json.gender = data.gender
                    form_json.locale = data.locale
                    form_json.emotion = data.emotion
                    form.val('form_filter', form_json);
                }
            }, function (n, elem, e) {
                layer.msg(i18n.trans("识别中"), { icon: 16, time: 30 * 1000 });
            })

            // 表单-提交事件
            form.on('submit(form_submit)', function (data) {
                var field = data.field;
                var elem = data.elem;
                // 请求数据
                data = JSON.stringify(field, null, 2);
                console.debug(field)
                // 不同行为
                if (action == 'query') {
                    table.reload('table', {
                        page: { curr: curr },
                        where: {
                            speaker: field.speaker,
                            gender: parseInt(field.gender) || 0,
                            locale: field.locale,
                            emotion: field.emotion,
                        }
                    });
                } else if (action == 'add' || action == 'update') {
                    title = i18n.trans("保存")
                    if (action == 'update') {
                        title = i18n.trans("修改")
                    }
                    layer.confirm(i18n.trans("确定提交？"), { title: i18n.trans("提示"), icon: 3 }, function (index) {
                        tools.post("/spk/upsert", data, function (response) {
                            console.debug(response.data)
                            toast.success(`${field.speaker}`, i18n.trans("操作成功"));
                            table.reloadData('table', { scrollPos: 'fixed' });
                        })
                    });
                }
                return false;
            });

            // 说话人=============

            // 数据表格
            var inst = table.render({
                elem: '#table',
                url: '/spk/page',
                method: 'post',
                contentType: 'application/json',
                page: {
                    curr: 1, //当前页码
                    groups: 5, //只显示 1 个连续页码
                    limit: 20,
                },
                request: {
                    pageName: 'page', limitName: 'size'
                },
                toolbar: '#TPL_table_toolbar',
                height: 'full-68',
                cols: [[
                    { type: 'checkbox' },
                    { title: i18n.trans("编号"), sort: true, width: 110, align: "center", templet: d => '<div title="' + d.text + '">' + d.LAY_NUM + '</div>' },
                    // { title: i18n.trans("类型"), sort: true, width: 80, align: "left", field: 'type', templet: d => '<div title="' + enums.voice(d.type) + '">' + enums.voice(d.type) + '</div>' },
                    { title: i18n.trans("说话人"), sort: true, width: 150, align: "left", field: 'speaker', templet: d => `<div title="${d.speaker}">${d.speaker}</div>` },
                    { title: i18n.trans("性别"), sort: true, width: 105, align: "left", field: 'gender', templet: d => '<div title="' + enums.gender(d.gender) + '">' + enums.gender(d.gender) + '</div>' },
                    { title: i18n.trans("语言"), sort: true, width: 105, align: "left", field: 'locale', templet: d => `<div title="${d.locale}">${d.locale}</div>` },
                    { title: i18n.trans("情感"), sort: true, width: 105, align: "left", field: 'emotion', templet: d => `<div title="${d.emotion ?? '-'}">${i18n.trans(`emotion.${d.emotion}`) ?? '-'}</div>` },
                    { title: i18n.trans("文本"), sort: false, field: 'text', templet: d => `<div title="${d.text}">${d.text}</div>` },
                    { title: i18n.trans("时长"), sort: true, width: 105, align: "center", field: 'duration', templet: d => `<div title="${d.duration}">${d.duration}</div>` },
                    { title: i18n.trans("启用"), sort: false, width: 80, align: "center", fixed: 'right', toolbar: "#TPL_table_status" },
                    { title: i18n.trans("操作"), sort: false, width: 220, align: "center", fixed: 'right', toolbar: "#TPL_table_tools" }
                ]],
                done: function (res, curr, count, origin) {
                    this.curr = curr
                },
            });

            // 工具栏事件
            table.on('toolbar(' + inst.config.id + ')', function (obj) {
                var id = obj.config.id;
                var checkStatus = table.checkStatus(id);
                var othis = lay(this);
                action = obj.event
                switch (obj.event) {
                    case 'query':
                        action = "query";
                        $('button[type="submit"]').text(i18n.trans("查询"));
                        $('button[type="submit"]').removeClass('layui-border-blue');
                        $('button[type="reset"]').click();
                        $('[lay-filter="query_filter"]').addClass('layui-hide');
                        $('[lay-filter="collapse_filter_speaker"] .layui-colla-content').addClass('layui-show');
                        break;
                    case 'add':
                        action = "add";
                        $('input[name="id"]').val(null);
                        $('button[type="submit"]').text(i18n.trans("保存"));
                        $('button[type="submit"]').addClass('layui-border-blue');
                        $('button[type="reset"]').click();
                        $('[lay-filter="query_filter"]').removeClass('layui-hide');
                        $('[lay-filter="collapse_filter_speaker"] .layui-colla-content').addClass('layui-show');
                        break;
                    case 'delete':
                        tools.delete("/spk/delete", function (response) {
                            console.debug(response.data)
                            table.reloadData(id, { scrollPos: 'fixed' });
                        }, true)
                        break;
                };
            });

            // 表格工具事件
            table.on('tool(' + inst.config.id + ')', function (obj) {
                var id = obj.config.id;
                var data = obj.data;
                var url = '/file/download?path=' + data.path;
                if (obj.event === "update") {
                    action = "update";
                    form.val('form_filter', data);
                    $('button[type="submit"]').text(i18n.trans("编辑"));
                    $('button[type="submit"]').addClass('layui-border-blue');
                    $('[lay-filter="query_filter"]').removeClass('layui-hide');
                    $('[lay-filter="collapse_filter_speaker"] .layui-colla-content').addClass('layui-show');
                } else if (obj.event === "preview") {
                    voice_play(url, data.speaker);
                } else if (obj.event === "download") {
                    var link = document.createElement('a');
                    link.href = url;
                    link.download = data.path.split(/[/\\]/).pop().split(".")[0];
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            });

            // 状态操作
            form.on('checkbox(table_status_filter)', function (obj) {
                id = obj.elem.attributes['mid'].nodeValue;
                data = JSON.stringify({ "id": id, "status": obj.elem.checked ? 1 : 0 });
                tools.post("/spk/status", data, function (response) {
                    console.debug(response.data)
                    var status = response.data.status;
                    if (status == 1) {
                        toast.success(i18n.trans("开启成功"));
                    } else {
                        toast.info(i18n.trans("关闭成功"));
                    }
                })
            });

            // 音频播放 - 使用 APlayer
            var voice_play = function (url, name) {
                if (!player) {
                    player = new APlayer({
                        container: document.getElementById('aplayer'),
                        fixed: true,
                        mini: true,
                        autoplay: true,
                        loop: 'none',
                        audio: []
                    });

                    // 监听错误事件
                    player.on('error', function () {
                        toast.error(i18n.trans("加载失败"));
                    });

                    // 播放结束后隐藏播放器
                    player.on('ended', function () {
                        var container = document.querySelector('.aplayer.aplayer-fixed');
                        if (container) {
                            container.style.display = 'none';
                        }
                    });
                }

                // 显示播放器
                var container = document.querySelector('.aplayer.aplayer-fixed');
                if (container) {
                    container.style.display = '';
                }

                // 清空播放列表并添加新音频
                player.list.clear();
                player.list.add({
                    name: name || i18n.trans("音频"),
                    artist: 'CreatorBox',
                    url: url,
                    cover: 'static/images/launcher.png'
                });
                player.play();
            };
        });
    </script>
    <script src="static/js/app/theme.js"></script>
</body>

</html>
