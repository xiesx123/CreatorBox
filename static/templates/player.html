<!DOCTYPE html>
<html lang="{{request.state.lang}}">

<head>
    <meta charset="utf-8" />
    <title>{{ data.app.title }} - Player</title>
    <meta name="renderer" content="webkit" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <!-- jquery -->
    <script src="static/js/thirdparty/jquery.min.js"></script>
    <script src="static/js/thirdparty/xgplayer.js"></script>
    <!-- nprogress -->
    <link href="static/js/thirdparty/nprogress/nprogress.min.css" rel="stylesheet">
    <script src="static/js/thirdparty/nprogress/nprogress.min.js"></script>
    <!-- layui -->
    <link href="static/js/thirdparty/layui/css/layui.css" rel="stylesheet">
    <link href="static/js/thirdparty/layui/css/layui-dark.css" rel="stylesheet">
    <script src="static/js/thirdparty/layui/layui.js"></script>
    <!-- creator -->
    <script src="static/js/app/theme.js"></script>
    <script src="static/js/app/app.js"></script>
    <style>
        #player-container {
            width: 100%;
            background-color: black;
            overflow-y: hidden;
        }
    </style>
</head>

<body>
    <div class="layui-layout layui-layout-admin">

        <div id="url_panel" class="layui-card layui-panel" style="margin-bottom:5px">
            <div class="layui-card-body">
                <div class="layui-form-item layui-col-space15" style="margin-bottom:0px">
                    <div class="layui-col-md11">
                        <div class="layui-input-wrap">
                            <input id="url" value="{{ data.url }}" type="text" placeholder='{{_("请输入任务ID、视频链接")}}' lay-affix="clear" class="layui-input">
                        </div>
                    </div>

                    <div class="layui-col-md1">
                        <div class="layui-input-wrap">
                            <button id="play" type="button" class="layui-btn layui-btn-primary layui-border-blue layui-btn-fluid">{{_("播放")}}</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="layui-card layui-panel">
            <div id="player-container"></div>
        </div>
    </div>

    <script>

        let player;

        layui.use(['layer', 'util', 'i18n_', 'tools'], function () {

            var layer = layui.layer;
            var util = layui.util;
            var i18n = layui.i18n_;
            i18n.init('{{request.state.lang}}');

            var tools = layui.tools;
            var $ = layui.$;

            // ================================ URL 参数解析 ================================

            var urlParams = layui.url().search;
            var autoplay = urlParams.autoplay === 'true' || urlParams.autoplay === '1';
            var showSearch = urlParams.search !== 'false' && urlParams.search !== '0';
            var defaultUrl = "{{ data.url }}";

            // ================================ 资源地址处理 ================================

            var build_url = function (url) {
                if (!url.startsWith('http')) {
                    url = `${window.location.protocol}//${window.location.host}/file/download?path=${encodeURIComponent(url)}`;
                }
                return url;
            };

            // ================================ 计算播放器高度 ================================

            function resizePlayer() {
                const playerContainer = document.getElementById('player-container');
                if (!playerContainer) return '360px';

                const playerCard = playerContainer.parentElement;
                const vh = window.innerHeight;
                const rect = playerCard.getBoundingClientRect();
                const topOffset = rect.top;
                const paddingTop = parseInt(window.getComputedStyle(playerCard).paddingTop, 10) || 0;

                let availableHeight = vh - topOffset - paddingTop;
                return Math.max(availableHeight, 360) + 'px';
            }

            // ================================ 视频播放 ================================

            var video_play = function (url, shouldAutoplay) {
                if (shouldAutoplay === undefined) shouldAutoplay = true;
                if (!url) {
                    layer.msg(i18n.trans("请输入任务ID、视频链接"), { icon: 0 });
                    return;
                }
                try {
                    if (player) {
                        player.destroy();
                        player = null;
                    }
                    player = new Player({
                        id: "player-container",
                        url: build_url(url),
                        playsinline: true,
                        autoplay: shouldAutoplay,
                        pip: true,
                        width: "100%",
                        height: resizePlayer(),
                        volume: 1
                    });
                } catch (error) {
                    console.error("Player initialization failed:", error);
                }
            };

            // ================================ 播放事件处理 ================================

            $('#play').click(function () {
                const input_url = $("#url").val();
                if (input_url.length !== 17) {
                    return video_play(input_url);
                }
                tools.get("/result/" + input_url, {}, function (response) {
                    console.debug(JSON.stringify(response, null, 2));
                    video_play(response.data.result.video_dub);
                });
            });

            // ================================ 窗口大小调整 ================================

            var resizeTimer;
            window.addEventListener('resize', function () {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function () {
                    if (player && typeof player.resize === 'function') {
                        const newHeight = resizePlayer();
                        player.resize(newHeight);
                    }
                }, 200);
            });

            // ================================ 初始化 UI ================================

            if (!showSearch) {
                $('#url_panel').hide();
            }

            // ================================ 自动播放 ================================

            $(document).ready(function () {
                if (defaultUrl && !autoplay) {
                    // 有默认 URL 且不自动播放：加载视频显示画面但不自动开始
                    video_play(defaultUrl);
                } else if (autoplay) {
                    // 自动播放：触发播放按钮
                    $('#play').click();
                }
            });
        });

    </script>
</body>

</html>
